<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de Imágenes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f0f13;
      color: #e8e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      margin-top: 0.4rem;
      color: #6b7280;
      font-size: 0.95rem;
    }

    .layout {
      display: flex;
      gap: 2rem;
      width: 100%;
      max-width: 1100px;
      align-items: stretch;
      justify-content: space-around;
    }

    .card {
      background: #1a1a24;
      border: 1px solid #2d2d3d;
      border-radius: 1rem;
      padding: 2rem;
      flex: 0 0 420px;
    }

    .panel {
      flex: 0 0 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a24;
      border: 1px solid #2d2d3d;
      border-radius: 1rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    textarea {
      width: 100%;
      height: 100px;
      background: #0f0f13;
      border: 1px solid #3d3d55;
      border-radius: 0.6rem;
      color: #e8e8f0;
      font-size: 1rem;
      padding: 0.75rem 1rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #7c3aed; }
    textarea::placeholder { color: #4b4b6b; }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 1.25rem;
    }

    .control-group label { margin-bottom: 0.35rem; }

    input[type="range"] {
      width: 100%;
      accent-color: #7c3aed;
      cursor: pointer;
    }

    .range-value {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #6b7280;
      margin-top: 0.2rem;
    }

    .range-value span { color: #a78bfa; font-weight: 600; }

    button {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      border: none;
      border-radius: 0.6rem;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .result {
      width: 100%;
      display: none;
    }

    .result img {
      width: 100%;
      border-radius: 1rem;
      border: 1px solid #2d2d3d;
      display: block;
    }

    .result .meta {
      margin-top: 0.75rem;
      font-size: 0.82rem;
      color: #6b7280;
      text-align: center;
    }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      color: #2d2d3d;
      font-size: 0.9rem;
    }

    .placeholder svg { opacity: 0.3; }

    .spinner {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      color: #6b7280;
      font-size: 0.9rem;
    }

    .spinner-ring {
      width: 48px;
      height: 48px;
      border: 4px solid #2d2d3d;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      margin-top: 1rem;
      background: #3b1d1d;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      display: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>Generador de Imágenes</h1>
    <p>Escribe un prompt y genera tu imagen con IA</p>
  </header>

  <div class="layout">

    <div class="card">
      <label for="prompt">Prompt</label>
      <textarea
        id="prompt"
        placeholder="Ej: a dog running on a beach at sunset, photorealistic"
      ></textarea>

      <div class="controls">
        <div class="control-group">
          <label for="steps">Pasos de inferencia</label>
          <input type="range" id="steps" min="5" max="50" value="15" step="5"
                 oninput="document.getElementById('stepsVal').textContent = this.value" />
          <div class="range-value">
            <span>5</span>
            <span id="stepsVal">15</span>
            <span>50</span>
          </div>
        </div>
        <div class="control-group">
          <label for="guidance">Guidance scale</label>
          <input type="range" id="guidance" min="1" max="20" value="7.5" step="0.5"
                 oninput="document.getElementById('guidanceVal').textContent = this.value" />
          <div class="range-value">
            <span>1</span>
            <span id="guidanceVal">7.5</span>
            <span>20</span>
          </div>
        </div>
      </div>

      <button id="btn" onclick="generate()">Generar imagen</button>
      <div class="error" id="error"></div>
    </div>

    <div class="panel">
      <div class="placeholder" id="placeholder">
        <svg width="80" height="80" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        <span>La imagen aparecerá aquí</span>
      </div>

      <div class="spinner" id="spinner">
        <div class="spinner-ring"></div>
        <span>Generando imagen...</span>
      </div>

      <div class="result" id="result">
        <img id="output" src="" alt="Imagen generada" />
        <p class="meta" id="meta"></p>
      </div>
    </div>

  </div>

  <script>
    async function generate() {
      const prompt = document.getElementById("prompt").value.trim();
      const steps = parseInt(document.getElementById("steps").value);
      const guidance = parseFloat(document.getElementById("guidance").value);
      const btn = document.getElementById("btn");
      const spinner = document.getElementById("spinner");
      const result = document.getElementById("result");
      const error = document.getElementById("error");

      if (!prompt) {
        showError("Por favor escribe un prompt.");
        return;
      }

      error.style.display = "none";
      result.style.display = "none";
      document.getElementById("placeholder").style.display = "none";
      spinner.style.display = "flex";
      btn.disabled = true;
      btn.textContent = "Generando...";

      const start = Date.now();

      try {
        const res = await fetch("/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt, steps, guidance_scale: guidance }),
        });

        const data = await res.json();

        if (!res.ok || data.error) {
          showError(data.error || "Error al generar la imagen.");
          return;
        }

        const elapsed = ((Date.now() - start) / 1000).toFixed(1);
        document.getElementById("output").src = "data:image/png;base64," + data.image;
        document.getElementById("meta").textContent =
          `"${prompt}" · ${steps} pasos · guidance ${guidance} · ${elapsed}s`;
        result.style.display = "block";

      } catch (err) {
        showError("Error de conexión con el servidor.");
      } finally {
        spinner.style.display = "none";
        btn.disabled = false;
        btn.textContent = "Generar imagen";
      }
    }

    function showError(msg) {
      const el = document.getElementById("error");
      el.textContent = msg;
      el.style.display = "block";
      document.getElementById("spinner").style.display = "none";
      document.getElementById("btn").disabled = false;
      document.getElementById("btn").textContent = "Generar imagen";
    }

    document.getElementById("prompt").addEventListener("keydown", e => {
      if (e.key === "Enter" && e.ctrlKey) generate();
    });
  </script>

</body>
</html>
